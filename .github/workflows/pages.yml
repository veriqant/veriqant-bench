name: Demo site

# Builds the public demo page (landing + pre-generated sample reports) and
# deploys it to GitHub Pages. All content is generated by the released
# tooling itself: real benchmark runs on simulators, real sealed records,
# real reports — explicitly labeled as simulator demonstrations.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - name: Install SDK
        run: uv sync --directory packages/bench
      - name: Build demo site
        run: uv run --directory packages/bench python ../../scripts/build_demo_site.py ../../site
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
