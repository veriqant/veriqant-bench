name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  python:
    name: Python (veriqore-bench)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/bench
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - name: Sync dependencies
        run: uv sync
      - name: Format check
        run: uv run ruff format --check .
      - name: Lint
        run: uv run ruff check .
      - name: Type check (strict)
        run: uv run mypy
      - name: Tests (coverage gate ≥90%)
        run: uv run pytest

  typescript:
    name: TypeScript (schema, api, web)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Build
        run: pnpm -r build
      - name: Type check
        run: pnpm -r typecheck
      - name: Lint
        run: pnpm lint
      - name: Tests
        run: pnpm -r test

  codegen-drift:
    name: Generated code matches schema
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install
        run: |
          pnpm install --frozen-lockfile
          uv sync --directory packages/bench
      - name: Regenerate all schema artifacts
        run: |
          pnpm --filter @veriqore/schema generate
          packages/schema/scripts/generate-pydantic.sh
          packages/schema/scripts/generate-example.sh
      - name: Fail on drift
        run: git diff --exit-code
