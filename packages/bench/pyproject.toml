[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "veriqore-bench"
version = "0.1.0"
description = "Standardized, reproducible benchmark suites for quantum processors — produces signed Quantum Performance Records (QPRs)"
readme = "README.md"
license = "Apache-2.0"
requires-python = ">=3.12"
authors = [{ name = "Veriqore" }]
keywords = ["quantum", "benchmarking", "qpu", "verification", "qec", "quantum-volume"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Science/Research",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Scientific/Engineering :: Physics",
    "Typing :: Typed",
]
dependencies = [
    "click>=8.1",
    "numpy>=1.26",
    "pydantic>=2.7",
]

[project.optional-dependencies]
# Provider SDKs are optional so the core install stays lean:
#   pip install veriqore-bench[local,braket]
# Local ideal/noisy simulation via Qiskit Aer — needs no provider account.
# Also required by benchmark circuit generation (Clifford utilities, fitting).
local = ["qiskit>=1.4", "qiskit-aer>=0.15", "qiskit-qasm3-import>=0.5", "scipy>=1.11"]
ibm = ["qiskit>=1.4", "qiskit-ibm-runtime>=0.34"]
# amazon-braket-sdk ships both LocalSimulator and the live client, so one
# extra covers braket_local now and the future live adapter.
braket = ["amazon-braket-sdk>=1.87"]
# QEC diagnostics: PyMatching decoding + Stim as validation oracle.
qec = ["pymatching>=2.2", "stim>=1.13"]
# Ed25519 signing/verification of QPRs.
signing = ["cryptography>=43"]

[project.urls]
Homepage = "https://github.com/veriqore/veriqore-bench"
Documentation = "https://github.com/veriqore/veriqore-bench/blob/main/docs/QPR-SPEC.md"
Changelog = "https://github.com/veriqore/veriqore-bench/blob/main/CHANGELOG.md"
Issues = "https://github.com/veriqore/veriqore-bench/issues"

[project.scripts]
veriqore-bench = "veriqore_bench.cli:main"

[project.entry-points."veriqore_bench.adapters"]
aer_simulator = "veriqore_bench.adapters.aer:AerSimulatorAdapter"
braket_local = "veriqore_bench.adapters.braket_local:BraketLocalAdapter"

[project.entry-points."veriqore_bench.benchmarks"]
rb = "veriqore_bench.benchmarks.rb:RandomizedBenchmarking"
mirror = "veriqore_bench.benchmarks.mirror:MirrorCircuits"
qv = "veriqore_bench.benchmarks.qv:QuantumVolume"
throughput = "veriqore_bench.benchmarks.throughput:Throughput"
qec_repetition = "veriqore_bench.benchmarks.qec.memory:RepetitionMemory"
qec_surface = "veriqore_bench.benchmarks.qec.memory:SurfaceMemory"

[project.entry-points."veriqore_bench.criteria_profiles"]
ab-lq-2026 = "veriqore_bench.benchmarks.qec.criteria.ab_lq_2026:AbLq2026Profile"

[dependency-groups]
dev = [
    "amazon-braket-sdk>=1.87",
    "cryptography>=43",
    "datamodel-code-generator>=0.26",
    "hypothesis>=6.112",
    "mypy>=1.13",
    "pymatching>=2.2",
    "pytest>=8.3",
    "pytest-asyncio>=0.24",
    "pytest-cov>=5.0",
    "pytest-timeout>=2.3",
    "pytest-xdist>=3.6",
    "qiskit>=1.4",
    "stim>=1.13",
    "qiskit-aer>=0.15",
    "qiskit-qasm3-import>=0.5",
    "ruff>=0.8",
    "scipy>=1.11",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
# Coverage flags live in CI / the documented full-suite command, NOT here:
# targeted single-file runs must not fail on package-wide coverage.
# Full gate:  uv run pytest -n auto --cov=veriqore_bench --cov-fail-under=90
timeout = 60
markers = [
    "slow: multi-second simulator executions",
]
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "function"

[tool.coverage.run]
branch = true

[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM", "C4", "RET", "RUF"]

[tool.ruff.lint.per-file-ignores]
# Generated code is normalized by ruff format only.
"src/veriqore_bench/qpr/_generated.py" = ["E501"]

[tool.mypy]
python_version = "3.12"
strict = true
files = ["src", "tests"]
plugins = ["pydantic.mypy"]

[[tool.mypy.overrides]]
module = "veriqore_bench.qpr._generated"
# Generated models: tolerate codegen artifacts (constr() in annotations is
# valid for pydantic but rejected by mypy's type-annotation rules).
disallow_any_explicit = false
disable_error_code = ["valid-type"]

[[tool.mypy.overrides]]
module = [
    "qiskit.*",
    "qiskit_aer.*",
    "qiskit_qasm3_import.*",
    "braket.*",
    "scipy.*",
    "pymatching.*",
    "stim.*",
]
ignore_missing_imports = true
